name: CI - Build Validation

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (validation)
        run: docker build -f Dockerfile.prod -t backend-cv:test .